<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNHS COMPUTER LAB PORTAL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507;
            --surface: rgba(255, 255, 255, 0.06);
            --surface-strong: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.12);
            --text: #f5f5f7;
            --text-dim: rgba(245, 245, 247, 0.62);
            --text-faint: rgba(245, 245, 247, 0.38);
            --accent: #0a84ff;
            --accent-2: #06b6d4;
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 28px 20px;
            position: relative;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        .background {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 18% 82%, rgba(10, 132, 255, 0.18), transparent 40%),
                radial-gradient(circle at 80% 18%, rgba(6, 182, 212, 0.12), transparent 38%),
                radial-gradient(circle at 50% 50%, rgba(120, 119, 198, 0.08), transparent 55%),
                linear-gradient(180deg, #050507 0%, #030304 100%);
            z-index: -2;
        }

        .background::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.035;
            mix-blend-mode: overlay;
        }

        .main-wrapper {
            max-width: 640px;
            width: 100%;
            text-align: center;
            margin: auto;
            position: relative;
            z-index: 1;
        }

        .portal-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 9px 18px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 26px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
        }

        .portal-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.12);
        }

        h1 {
            font-size: clamp(34px, 5vw, 52px);
            font-weight: 800;
            letter-spacing: -0.05em;
            line-height: 1.02;
            margin-bottom: 14px;
            background: linear-gradient(135deg, #ffffff 0%, rgba(255,255,255,0.72) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 15px;
            color: var(--text-dim);
            margin: 0 auto 34px;
            line-height: 1.6;
            max-width: 540px;
        }

        .card-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }

        .card {
            width: 100%;
            max-width: 420px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px 18px 22px;
            border-radius: 18px;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(180deg, rgba(255,255,255,0.075), rgba(255,255,255,0.045));
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.28);
            transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: rgba(10, 132, 255, 0.35);
            background: linear-gradient(180deg, rgba(255,255,255,0.095), rgba(255,255,255,0.055));
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
        }

        .card h2 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .card span {
            color: var(--accent-2);
            font-weight: 700;
            font-size: 22px;
            transition: transform 0.25s ease;
        }

        .card:hover span { transform: translateX(3px); }

        .footer-branding {
            text-align: center;
            margin-top: 44px;
            padding-top: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }

        .footer-branding h3 {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.4px;
            color: rgba(255, 255, 255, 0.42);
            text-transform: uppercase;
        }

        @media (max-width: 480px) {
            body { padding: 22px 16px; }
            .card { padding: 16px 18px 16px 20px; }
            .footer-branding { margin-top: 36px; }
        }
    </style>
</head>
<body>
    <div class="background"></div>

    <div class="main-wrapper">
        <div class="portal-badge"><span class="dot"></span><span>ONLINE</span></div>
        <h1>DNHS QR BASED</h1>
        <p>Real-time station monitoring with secure cloud synchronization.</p>

        <div class="card-container">
            <a href="/student.html" class="card">
                <h2>LAUNCH</h2>
                <span>→</span>
            </a>
        </div>
    </div>

    <div class="footer-branding">
        <h3>DARAGA NATIONAL HIGH SCHOOL</h3>
    </div>
</body>
</html>
