<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNHS Computer Lab Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 40px 24px; position: relative; overflow-x: hidden; }
        .background { position: fixed; inset: 0; background: radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.25), transparent 50%), radial-gradient(circle at 80% 20%, rgba(6, 182, 212, 0.15), transparent 50%); z-index: -1; }
        
        .main-wrapper { max-width: 600px; width: 100%; text-align: center; margin: auto; }
        .portal-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 100px; padding: 8px 20px; font-size: 13px; color: rgba(255, 255, 255, 0.8); margin-bottom: 24px; }
        .portal-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #06b6d4; }
        
        h1 { font-size: 40px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
        p { font-size: 15px; color: rgba(255,255,255,0.6); margin-bottom: 36px; line-height: 1.5; }
        
        .card-container { display: flex; flex-direction: column; gap: 16px; align-items: center; }
        .card { width: 100%; max-width: 380px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 24px 30px; text-decoration: none; color: #fff; transition: all 0.2s ease; display: flex; justify-content: space-between; align-items: center; }
        .card:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(6, 182, 212, 0.4); transform: translateY(-2px); }
        .card h2 { font-size: 16px; font-weight: 600; }
        .card span { color: #06b6d4; font-weight: 600; font-size: 18px; }
        
        .footer-branding { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.06); width: 100%; max-width: 400px; }
        .footer-branding h3 { font-size: 12px; font-weight: 700; letter-spacing: 2px; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="background"></div>

    <div></div> <div class="main-wrapper">
        <div class="portal-badge"><span class="dot"></span><span>SYSTEM ONLINE / OFFLINE READY</span></div>
        <h1>DNHS Computer Lab</h1>
        <p>Real-time station monitoring with secure cloud synchronization and automatic offline local backup support.</p>
        
        <div class="card-container">
            <a href="/student.html" class="card">
                <h2>Launch Student Terminal</h2>
                <span>→</span>
            </a>
        </div>
    </div>

    <div class="footer-branding">
        <h3>DARAGA NATIONAL HIGH SCHOOL</h3>
    </div>
</body>
</html>
