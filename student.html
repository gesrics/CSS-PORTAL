<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>DNHS Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507;
            --glass: rgba(255, 255, 255, 0.055);
            --glass-strong: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.10);
            --border-soft: rgba(255, 255, 255, 0.06);
            --text: #f5f5f7;
            --text-dim: rgba(245, 245, 247, 0.55);
            --text-faint: rgba(245, 245, 247, 0.35);
            --accent: #0a84ff;
            --accent-2: #06b6d4;
            --danger: #ff453a;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        .background {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(60% 50% at 18% 82%, rgba(10, 132, 255, 0.22), transparent 60%),
                radial-gradient(55% 45% at 82% 18%, rgba(6, 182, 212, 0.16), transparent 60%),
                radial-gradient(70% 60% at 50% 50%, rgba(120, 80, 220, 0.08), transparent 70%);
            z-index: 0;
            animation: drift 18s ease-in-out infinite alternate;
        }
        @keyframes drift {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.08) translate(-1.5%, 1.5%); }
        }

        .splash {
            position: fixed;
            inset: 0;
            z-index: 60;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 26px;
            background: var(--bg);
            transition: opacity 0.7s var(--ease), visibility 0.7s var(--ease);
        }
        .splash.hide { opacity: 0; visibility: hidden; }

        .terminal {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 430px;
            padding: 22px 18px;
            padding-top: max(22px, env(safe-area-inset-top));
            padding-bottom: max(22px, env(safe-area-inset-bottom));
        }

        .terminal-header { text-align: center; margin-bottom: 26px; }

        .pc-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 7px 16px;
            font-size: 12.5px; font-weight: 500;
            color: var(--text-dim);
            margin-bottom: 20px;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            opacity: 0;
            visibility: hidden;
            transform: translateY(8px);
            transition: opacity 0.3s var(--ease), visibility 0.3s var(--ease), transform 0.3s var(--ease);
        }
        .pc-badge.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(38px) saturate(180%);
            -webkit-backdrop-filter: blur(38px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 26px;
            padding: 30px 26px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .anim {
            opacity: 0;
            transform: translateY(18px) scale(0.985);
            transition: opacity 0.55s var(--ease), transform 0.55s var(--ease);
            pointer-events: none;
        }
        .anim.show { opacity: 1; transform: none; pointer-events: auto; }
        .hidden { display: none !important; }

        .scan-status {
            margin-top: 14px; font-size: 13px; font-weight: 500;
            color: var(--text-dim); min-height: 18px;
        }

        .loader {
            position: fixed; inset: 0; z-index: 55;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
            background: rgba(5, 5, 7, 0.55);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s var(--ease);
        }
        .loader.show { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>
    <div class="background"></div>

    <div class="splash" id="splash"></div>

    <div class="terminal">
        <div class="terminal-header">
            <div class="pc-badge" id="pcBadge"><span class="dot"></span><span id="pcBadgeText"></span></div>
            <h1 id="pageTitle">Student Terminal</h1>
            <p id="pageSubtitle">Scan the station QR code to begin</p>
        </div>

        <section class="glass-card gate-card anim" id="gateCard">
            <h2>Access Blocked</h2>
            <p class="sub">Scan the QR code displayed at this station to unlock the terminal.</p>

            <div class="scanner-wrap">
                <div id="qr-reader"></div>
            </div>
            <p class="scan-status" id="scanStatus">Initializing camera…</p>
        </section>

        <section class="glass-card anim hidden" id="mainCard">
            <div class="anim" id="authView">
                <div class="input-group">
                    <label for="lrn">Learner Reference Number</label>
                    <input type="text" id="lrn" inputmode="numeric" placeholder="Enter your 12-digit LRN" maxlength="12" autocomplete="off">
                </div>
                <button class="btn" id="signInBtn">Sign In</button>
            </div>
        </section>
    </div>

    <div class="loader" id="loader">
        <div class="loader-ring"></div>
        <div class="loader-label" id="loaderLabel">Authenticating…</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const expectedPC = (params.get('pc') || '').padStart(2, '0');
        let qrAccessGranted = false;
        let html5Qr = null;
        let barcodeStream = null;
        let rafId = null;

        const pcBadge = document.getElementById('pcBadge');
        const pcBadgeText = document.getElementById('pcBadgeText');

        function showPCBadge(pc) {
            pcBadgeText.textContent = `PC ${pc}`;
            pcBadge.classList.add('show');
        }

        function setStatus(msg, color) {
            const el = document.getElementById('scanStatus');
            el.textContent = msg;
            el.style.color = color || 'var(--text-dim)';
        }

        function extractPC(text) {
            const raw = String(text || '').trim();
            if (!raw) return '';
            try {
                const url = new URL(raw);
                const pc = url.searchParams.get('pc');
                return (pc || '').trim().padStart(2, '0');
            } catch (_) {
                const match = raw.match(/[?&]pc=(\d{1,2})/i);
                return match ? match[1].padStart(2, '0') : '';
            }
        }

        function handleScan(raw) {
            if (qrAccessGranted) return;

            const scannedPC = extractPC(raw);
            if (!scannedPC) {
                setStatus('Invalid QR code. Please scan a station QR.', 'var(--danger)');
                return;
            }

            showPCBadge(scannedPC);

            if (expectedPC && scannedPC !== expectedPC) {
                setStatus(`Scanned PC ${scannedPC}.`, 'var(--accent-2)');
                return;
            }

            setStatus(`Scanned PC ${scannedPC}. Access granted.`, 'var(--accent-2)');
            qrAccessGranted = true;
            stopScanner();
            grantAccess();
        }

        function stopScanner() {
            if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
            if (barcodeStream) {
                barcodeStream.getTracks().forEach(t => t.stop());
                barcodeStream = null;
            }
            if (html5Qr) {
                html5Qr.stop().catch(() => {}).then(() => html5Qr.clear().catch(() => {})).catch(() => {});
            }
        }

        async function startHtml5Qrcode() {
            if (typeof Html5Qrcode === 'undefined') {
                setStatus('Scanner not available.');
                return;
            }

            try {
                html5Qr = new Html5Qrcode('qr-reader', false);
                await html5Qr.start(
                    { facingMode: 'environment' },
                    { fps: 12, qrbox: { width: 230, height: 230 }, aspectRatio: 1.0 },
                    (decoded) => handleScan(decoded),
                    () => {}
                );
                setStatus('Point the QR code at the frame');
            } catch (e) {
                console.error(e);
                setStatus('Camera error or permission denied.');
            }
        }

        function grantAccess() {
            document.getElementById('gateCard').classList.add('hidden');
            document.getElementById('mainCard').classList.remove('hidden');
            document.getElementById('mainCard').classList.add('show');
            document.getElementById('authView').classList.add('show');
        }

        window.addEventListener('load', () => {
            document.getElementById('splash').classList.add('hide');
            document.getElementById('gateCard').classList.add('show');
            startHtml5Qrcode();
        });

        window.addEventListener('pagehide', stopScanner);
    </script>
</body>
</html>
