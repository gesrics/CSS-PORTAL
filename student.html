<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNHS Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-dark: #090d16; --accent-cyan: #06b6d4; }
        body { background: var(--bg-dark); color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; border: 1px solid #334155; }
        input { width: 100%; padding: 15px; margin: 15px 0; background: #000; border: 1px solid #334155; color: #fff; border-radius: 10px; }
        .btn { width: 100%; padding: 15px; background: var(--accent-cyan); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <h2 id="title">Station Gate</h2>
    <div id="gateLock">🔒 Scanning Workstation...</div>
    <div id="gateForm" style="display:none;">
        <div id="pcBadge" style="color:var(--accent-cyan); font-weight:bold; margin-bottom:10px;">PC-XX</div>
        <input type="text" id="lrn" placeholder="Enter 12-digit LRN" maxlength="12">
        <button class="btn" onclick="processAuth()">Claim Accountability</button>
    </div>
</div>

<script>
    const supabase = window.supabase.createClient("https://kofyybvvzzlcxemwlaqu.supabase.co", "sb_publishable_EXyi06rbFxY4OUV1XRyfjw_omMnlxFN");

    window.onload = () => {
        // Aggressive PC Detection: URL Query (?pc=01) o Hash (#pc01)
        const params = new URLSearchParams(window.location.search);
        let pc = params.get('pc') || window.location.hash.replace('#', '').replace('pc', '');
        
        // AUTO-FIX: Kung walang PC, gawing 01 para hindi ma-lock
        if (!pc) pc = "01"; 

        document.getElementById('gateLock').style.display = "none";
        document.getElementById('gateForm').style.display = "block";
        document.getElementById('pcBadge').innerText = `💻 WORKSTATION PC-${pc}`;
        window.targetPC = pc;
    };

    async function processAuth() {
        const lrn = document.getElementById('lrn').value.trim();
        if (lrn.length < 12) return alert("Invalid LRN");

        let { data: student } = await supabase.from('student_roster').select('student_name').eq('lrn', lrn).single();
        if (student) {
            await supabase.from('active_sessions').update({ 
                student_id: lrn, 
                student_name: student.student_name, 
                time_in: new Date().toISOString() 
            }).eq('pc_number', window.targetPC);
            alert("Welcome " + student.student_name);
            window.location.reload();
        } else {
            alert("LRN not found.");
        }
    }
</script>
</body>
</html>
