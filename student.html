<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNHS Terminal - Student</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-dark: #090d16;
            --glass-card: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-cyan: #06b6d4;
            --accent-emerald: #10b981;
            --text-muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg-dark); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: #fff; position: relative; overflow: hidden; }
        body::before { content: ''; position: absolute; width: 300px; height: 300px; background: rgba(6, 182, 212, 0.15); border-radius: 50%; top: -50px; filter: blur(60px); }
        
        .glass-card { background: var(--glass-card); border: 1px solid var(--glass-border); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); width: 100%; max-width: 400px; padding: 40px 30px; border-radius: 28px; box-shadow: 0 25px 60px rgba(0,0,0,0.6); text-align: center; }
        .brand { font-size: 0.75rem; color: var(--accent-cyan); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        h2 { font-size: 1.7rem; font-weight: 800; margin-bottom: 25px; letter-spacing: -0.5px; }
        
        .lock-icon { font-size: 3.5rem; margin-bottom: 15px; }
        .lock-text { color: #94a3b8; font-size: 0.9rem; line-height: 1.6; }
        
        .station-badge { display: inline-flex; align-items: center; background: rgba(6, 182, 212, 0.08); border: 1px solid rgba(6, 182, 212, 0.25); color: var(--accent-cyan); font-weight: 700; padding: 10px 22px; border-radius: 14px; font-size: 0.9rem; margin-bottom: 30px; }
        
        .input-group { text-align: left; margin-bottom: 25px; }
        label { display: block; font-size: 0.8rem; font-weight: 700; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; padding: 16px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 14px; color: #fff; font-size: 1rem; outline: none; transition: all 0.2s; }
        input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.15); }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--accent-cyan); color: #090d16; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-danger { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); margin-top: 20px; }
        .btn-danger:hover { background: #ef4444; color: #fff; }

        .welcome-msg { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; }
        .welcome-msg span { color: var(--accent-cyan); }
        
        .metric-box { background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 16px; padding: 18px; margin-bottom: 15px; text-align: left; }
        .metric-lbl { font-size: 0.7rem; color: #64748b; font-weight: 700; text-transform: uppercase; }
        .metric-val { font-size: 1.15rem; font-weight: 700; margin-top: 4px; }
        .timer { color: var(--accent-emerald); font-family: monospace; font-size: 1.35rem; }
    </style>
</head>
<body>

<div class="glass-card" id="mainCard">
    <div class="brand">Daraga National HS</div>
    <h2 id="viewTitle">Station Security Gate</h2>

    <div id="gateLock">
        <div class="lock-icon">🔒</div>
        <p class="lock-text"><strong>Access Blocked.</strong><br>Please use your smartphone camera to scan the official QR Code pasted on your workstation to proceed.</p>
    </div>

    <div id="gateForm" style="display:none;">
        <div id="pcBadge" class="station-badge">💻 WORKSTATION STALL</div>
        <div class="input-group">
            <label>Student LRN (12 Digits)</label>
            <input type="text" id="lrn" placeholder="Enter your 12-digit student LRN" maxlength="12">
        </div>
        <button class="btn btn-primary" onclick="processAuth('LOGIN')">Claim Accountability</button>
    </div>

    <div id="gateDashboard" style="display:none;">
        <div class="welcome-msg">Welcome, <span id="usrName">Student</span>! 👋</div>
        <div class="metric-box">
            <div class="metric-lbl">Assigned Hardware Unit</div>
            <div class="metric-val" id="assignedUnit">PC Station #--</div>
        </div>
        <div class="metric-box">
            <div class="metric-lbl">Active Session Duration</div>
            <div class="metric-val timer" id="sessionClock">00:00:00</div>
        </div>
        <button class="btn btn-danger" onclick="processAuth('LOGOUT')">Release Station (Sign Out)</button>
    </div>
</div>

<script>
    // ⚡ SUPABASE PRODUCTION CONFIGURATION
    const DB_URL = "https://kofyybvvzzlcxemwlaqu.supabase.co"; 
    const DB_KEY = "sb_publishable_EXyi06rbFxY4OUV1XRyfjw_omMnlxFN"; // Ginamit ko muna ito ayon sa binigay mo

    const supabase = window.supabase.createClient(DB_URL, DB_KEY);
    let targetPC = null;
    let timerRef = null;

    window.onload = function() {
        const currentUrl = window.location.href;
        
        // Sobrang higpit na pagbasa sa URL kahit anong dulo (Hash man o Parameter o Query)
        if (currentUrl.includes('pc=01') || currentUrl.includes('pc01')) {
            targetPC = "01";
        } else if (currentUrl.includes('pc=02') || currentUrl.includes('pc02')) {
            targetPC = "02";
        }

        // 🚨 FALLBACK TEST: Kung bubuksan mo ang student.html nang walang dulo, 
        // automatic itong mag-de-default sa PC-01 para hindi ka ma-stuck sa lock screen tuwing nagte-test!
        if (!targetPC) {
            console.log("No route detected. Auto-assigning to PC-01 for testing purposes.");
            targetPC = "01"; 
        }
        
        // I-unlock na ang interface
        document.getElementById('gateLock').style.display = "none";
        document.getElementById('gateForm').style.display = "block";
        document.getElementById('pcBadge').innerText = `💻 WORKSTATION PC-${targetPC}`;

        if (localStorage.getItem(`active_session_${targetPC}`) === 'true') { 
            launchDashboard(); 
        }
    }

    function launchDashboard() {
        document.getElementById('gateForm').style.display = "none";
        document.getElementById('gateDashboard').style.display = "block";
        
        document.getElementById('usrName').innerText = localStorage.getItem(`session_user_${targetPC}`);
        document.getElementById('assignedUnit').innerText = `PC Workstation Stalls #${targetPC}`;
        
        clearInterval(timerRef);
        const startTimestamp = parseInt(localStorage.getItem(`session_start_${targetPC}`), 10);
        timerRef = setInterval(() => {
            const delta = Math.floor((Date.now() - startTimestamp) / 1000);
            const hrs = String(Math.floor(delta / 3600)).padStart(2, '0');
            const mins = String(Math.floor((delta % 3600) / 60)).padStart(2, '0');
            const secs = String(delta % 60).padStart(2, '0');
            document.getElementById('sessionClock').innerText = `${hrs}:${mins}:${secs}`;
        }, 1000);
    }

    async function processAuth(type) {
        const inputLRN = document.getElementById('lrn').value.trim();
        if (type === 'LOGIN' && (!inputLRN || inputLRN.length < 12)) { 
            alert('Please supply a valid 12-digit LRN identifier.'); 
            return; 
        }

        if (type === 'LOGIN') {
            let { data: student, error } = await supabase.from('student_roster').select('student_name').eq('lrn', inputLRN).single();
            
            if (error || !student) { 
                alert('Access Refused: LRN record does not exist in your Supabase table.'); 
                return; 
            }

            let { error: lockErr } = await supabase.from('active_sessions').update({ student_id: inputLRN, student_name: student.student_name, time_in: new Date() }).eq('pc_number', targetPC);
            
            if(!lockErr) {
                localStorage.setItem(`active_session_${targetPC}`, 'true');
                localStorage.setItem(`session_user_${targetPC}`, student.student_name);
                localStorage.setItem(`session_start_${targetPC}`, Date.now().toString());
                launchDashboard();
            } else {
                alert("Database Update Error. Check active_sessions rows.");
            }
        } else {
            let { error: releaseErr } = await supabase.from('active_sessions').update({ student_id: null, student_name: null, time_in: null }).eq('pc_number', targetPC);
            if(!releaseErr) {
                localStorage.clear();
                window.location.reload();
            }
        }
    }
</script>
</body>
</html>
