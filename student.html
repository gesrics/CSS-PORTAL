<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNHS CSS QRBASED</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .background { position: fixed; inset: 0; background: radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.25), transparent 50%), radial-gradient(circle at 80% 20%, rgba(255, 119, 115, 0.15), transparent 50%); z-index: -1; }
        .terminal-container { width: 100%; max-width: 420px; padding: 20px; }
        .pc-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 100px; padding: 8px 20px; font-size: 13px; color: rgba(255, 255, 255, 0.8); margin-bottom: 24px; }
        .pc-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #06b6d4; }
        .glass-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 32px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; color: rgba(255, 255, 255, 0.7); margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 16px 18px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 14px; color: #fff; font-size: 15px; outline: none; }
        .btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #3b82f6, #06b6d4); border: none; border-radius: 14px; font-weight: 600; font-size: 15px; cursor: pointer; color: #fff; }
        .btn-offline-bypass { margin-top: 10px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); font-size: 13px; }
        .btn-danger { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }
        .pc-grid-select { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-pc-choice { padding: 14px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; color: #fff; font-weight: 600; cursor: pointer; text-align: left; }
        .btn-pc-choice.occupied { opacity: 0.5; border-color: rgba(239, 68, 68, 0.3); cursor: not-allowed; }
        .pc-choice-status { font-size: 11px; display: block; margin-top: 4px; color: rgba(255,255,255,0.5); }
        .hidden { display: none !important; }
        
        /* Pro Scanner UI Customizations */
        #qr-reader { border: none !important; background: transparent !important; }
        #qr-reader__dashboard { padding: 0 !important; }
        #qr-reader__dashboard_section_csr span { color: rgba(255,255,255,0.7) !important; font-size: 12px !important; }
        #qr-reader button { padding: 8px 16px !important; background: rgba(255,255,255,0.1) !important; border: 1px solid rgba(255,255,255,0.2) !important; border-radius: 8px !important; color: #fff !important; font-weight: 500 !important; cursor: pointer !important; margin-top: 8px !important; }
        #qr-reader select { padding: 8px !important; background: rgba(0,0,0,0.5) !important; color: #fff !important; border: 1px solid rgba(255,255,255,0.2) !important; border-radius: 8px !important; margin-bottom: 8px !important; }
    </style>
</head>
<body>
    <div class="background"></div>

    <div class="terminal-container">
        <div style="text-align: center; margin-bottom: 32px;">
            <div class="pc-badge hidden" id="pcBadgeContainer"><span class="dot"></span><span id="pcBadge">PC STATION</span></div>
            <h1 id="pageTitle" style="font-size: 32px; font-weight: 700; margin-bottom: 8px;">STUDENT WORKPLACE</h1>
            <p id="pageSubtitle" style="font-size: 14px; color: rgba(255, 255, 255, 0.5);">SCAN STATION QR CODE</p>
        </div>

        <div class="glass-card" id="qrGateCard">
            <h2>ACCESS BLOCKED </h2>
            <p style="font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px; margin-bottom: 16px;">SCAN STATION QR CODE OR USE OFFLINE MODE</p>
            <div id="qr-reader" style="border-radius: 16px; overflow: hidden; min-height: 180px;"></div>
            <button class="btn btn-offline-bypass" onclick="showPCSelector()" style="margin-top: 16px;">OFFLINE MODE</button>
        </div>

        <div class="glass-card hidden" id="pcSelectorCard">
            <h2>Select PC Station</h2>
            <p style="font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px; margin-bottom: 16px;">cHOOSE VACANT PC</p>
            <div class="pc-grid-select" id="pcGridOptions"></div>
            <button class="btn btn-offline-bypass" onclick="backToQRGate()">Back to QR Scanner</button>
        </div>

        <div class="glass-card hidden" id="mainCard">
            <div id="gateForm">
                <div class="input-group">
                    <label>LRN</label>
                    <input type="text" id="lrn" placeholder="Enter LRN" autocomplete="off">
                </div>
                <button class="btn" onclick="processAuth()">Sign In</button>
            </div>
            <div id="dashboard" class="hidden">
                <div style="margin-bottom: 15px;">
                    <label style="font-size: 11px; color: rgba(255,255,255,0.5);">Student Profile</label>
                    <div id="dashName" style="font-size: 16px; font-weight: 600;">--</div>
                    <div id="dashTimeIn" style="font-size: 13px; color: #06b6d4; margin-top: 4px;">--</div>
                    <div id="dashDuration" style="font-size: 13px; color: #facc15; margin-top: 2px;">Duration: 0m 0s</div>
                </div>
                <button class="btn btn-danger" onclick="signOut()">End Session</button>
            </div>
        </div>
    </div>

    <script>
        const client = (typeof supabase !== 'undefined') ? supabase.createClient("https://kofyybvvzzlcxemwlaqu.supabase.co", "sb_publishable_EXyi06rbFxY4OUV1XRyfjw_omMnlxFN") : null;
        let targetPC = null;
        let durationInterval = null;
        let html5QrCode = null;

        const offlineStudents = {
         ​"111657140011": "LANCE M. LORENO",
"114479140159": "QUENIE D. REALUBIT",
"111670140069": "HALIA QUEEN T. BARANQUIL",
"111669140011": "GABRIEL A. MANDANE",
"111660140027": "KIM LOUIS L. MANSOS",
"111662140084": "MARK JOSEPH E. MANILA",
"111649140009": "ANGEL SHANE R. AIS",
"114477140158": "RAY JOHN M. BENDAÑA",
"111662140124": "JOHN CARL M. NAJE",
"111658140062": "JOHN DRAIVE N. ESTUYE",
"136891140624": "ALKHARIM JHARO ISAAC"
        };

        window.addEventListener('load', () => { 
            const urlParams = new URLSearchParams(window.location.search);
            const pcParam = urlParams.get('pc');
            
            if (pcParam && ['01', '02', '03', '04'].includes(pcParam)) {
                // Check kung occupied na ang URL-passed PC
                if (localStorage.getItem(`dnhs_session_pc_${pcParam}`)) {
                    Swal.fire("Error", `Ang PC-${pcParam} ay may active session na!`, "error");
                } else {
                    grantAccess(pcParam);
                }
            } else {
                setTimeout(initQRScanner, 500);
            }
            checkExistingActiveSession();
        });

        function checkExistingActiveSession() {
            if (!targetPC) return;
            const localData = localStorage.getItem(`dnhs_session_pc_${targetPC}`);
            if (localData) {
                try {
                    const parsed = JSON.parse(localData);
                    if (parsed && parsed.student_id) {
                        restoreDashboard(parsed);
                    }
                } catch(e) {}
            }
        }

        async function showPCSelector() {
            if (html5QrCode) {
                try { await html5QrCode.stop(); } catch(e) {}
            }
            let busyPCs = [];
            for(let i=1; i<=4; i++) {
                const pc = String(i).padStart(2, '0');
                if (localStorage.getItem(`dnhs_session_pc_${pc}`)) busyPCs.push(pc);
            }
            if (client && navigator.onLine) {
                try {
                    const { data } = await client.from('active_sessions').select('pc_number, student_id').lte('pc_number', '04').not('student_id', 'is', null);
                    if (data) data.forEach(s => { if (!busyPCs.includes(s.pc_number)) busyPCs.push(s.pc_number); });
                } catch(e) {}
            }

            const grid = document.getElementById('pcGridOptions');
            grid.innerHTML = '';
            for(let i=1; i<=4; i++) {
                const pc = String(i).padStart(2, '0');
                const occupied = busyPCs.includes(pc);
                const btn = document.createElement('button');
                btn.className = 'btn-pc-choice' + (occupied ? ' occupied' : '');
                btn.innerHTML = `<strong>PC-${pc}</strong><span class="pc-choice-status">${occupied ? 'Occupied' : 'Vacant'}</span>`;
                btn.onclick = occupied ? () => Swal.fire("Occupied", `Ang PC-${pc} ay may gumagamit na.`, "error") : () => grantAccess(pc);
                grid.appendChild(btn);
            }
            document.getElementById('qrGateCard').classList.add('hidden');
            document.getElementById('pcSelectorCard').classList.remove('hidden');
        }

        function backToQRGate() {
            document.getElementById('pcSelectorCard').classList.add('hidden');
            document.getElementById('qrGateCard').classList.remove('hidden');
            setTimeout(initQRScanner, 300);
        }

        function grantAccess(pc) {
            if (html5QrCode) {
                try { html5QrCode.stop(); } catch(e) {}
            }
            targetPC = pc;
            document.getElementById('pcBadge').innerText = `PC ${targetPC}`;
            document.getElementById('pcBadgeContainer').classList.remove('hidden');
            document.getElementById('qrGateCard').classList.add('hidden');
            document.getElementById('pcSelectorCard').classList.add('hidden');
            document.getElementById('mainCard').classList.remove('hidden');
            checkExistingActiveSession();
        }

        function initQRScanner() {
            if (!navigator.mediaDevices) return;
            try {
                html5QrCode = new Html5Qrcode("qr-reader");
                const config = { fps: 15, qrbox: { width: 190, height: 190 } };
                
                html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    (decodedText) => {
                        let pc = String(decodedText).replace(/[^0-9]/g, '').padStart(2, '0');
                        if (['01','02','03','04'].includes(pc)) {
                            if (localStorage.getItem(`dnhs_session_pc_${pc}`)) {
                                Swal.fire("Error", "Occupied na ang PC na ito!", "error");
                                return;
                            }
                            html5QrCode.stop().then(() => grantAccess(pc)).catch(() => grantAccess(pc));
                        }
                    },
                    (errorMessage) => {}
                ).catch(err => {
                    html5QrCode.start({ facingMode: "user" }, config, (decodedText) => {
                        let pc = String(decodedText).replace(/[^0-9]/g, '').padStart(2, '0');
                        if (['01','02','03','04'].includes(pc)) {
                            html5QrCode.stop().then(() => grantAccess(pc));
                        }
                    }, () => {});
                });
            } catch(e) {}
        }

        async function processAuth() {
            const lrn = document.getElementById('lrn').value.trim();
            if(!lrn) return Swal.fire("Oops!", "Enter LRN.", "warning");
            if(!targetPC) return Swal.fire("Error", "Station PC not identified.", "error");

            Swal.fire({ title: 'Checking LRN...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            for(let i=1; i<=4; i++) {
                const pKey = String(i).padStart(2, '0');
                if (pKey !== targetPC) {
                    const existingData = localStorage.getItem(`dnhs_session_pc_${pKey}`);
                    if (existingData) {
                        try {
                            const parsed = JSON.parse(existingData);
                            if (parsed && parsed.student_id === lrn) {
                                Swal.close();
                                return Swal.fire("Bawal", `Ang LRN na ito ay may active session pa sa PC-${pKey}!`, "error");
                            }
                        } catch(e) {}
                    }
                }
            }

            if (client && navigator.onLine) {
                try {
                    const { data, error } = await client.from('active_sessions')
                        .select('pc_number, student_id')
                        .eq('student_id', lrn)
                        .neq('pc_number', targetPC);
                    
                    if (!error && data && data.length > 0) {
                        Swal.close();
                        return Swal.fire("Bawal", `Ang LRN na ito ay naka-login na sa PC-${data[0].pc_number}!`, "error");
                    }
                } catch(e) {}
            }

            Swal.update({ title: 'Processing...' });

            let studentName = offlineStudents[lrn];
            const studentSection = "12 CSS";

            if (!studentName && client && navigator.onLine) {
                try {
                    let { data } = await client.from('student_roster').select('student_name').eq('lrn', lrn).single();
                    if (data) studentName = data.student_name;
                } catch(e) {}
            }

            if (!studentName) studentName = "REGISTERED STUDENT";

            const now = new Date();
            const sessionData = { 
                pc_number: targetPC, 
                student_id: lrn, 
                student_name: studentName, 
                section: studentSection,
                time_in: now.toISOString() 
            };

            localStorage.setItem(`dnhs_session_pc_${targetPC}`, JSON.stringify(sessionData));

            if (client && navigator.onLine) {
                try {
                    await client.from('active_sessions').update({ 
                        student_id: lrn, 
                        student_name: `${studentName} (${studentSection})`, 
                        time_in: now.toISOString() 
                    }).eq('pc_number', targetPC);
                } catch(e) {}
            }

            Swal.close();
            restoreDashboard(sessionData);
            Swal.fire("Success", "Session Started!", "success");
        }

        function restoreDashboard(data) {
            document.getElementById('gateForm').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('dashName').innerText = `${data.student_name} (${data.section || '12 CSS'})`;
            
            const timeInDate = new Date(data.time_in);
            document.getElementById('dashTimeIn').innerText = `Time In: ${timeInDate.toLocaleTimeString()}`;
            
            document.getElementById('pageTitle').innerText = 'Session Active';
            
            if (durationInterval) clearInterval(durationInterval);
            durationInterval = setInterval(() => {
                const diff = Math.floor((new Date() - timeInDate) / 1000);
                const hrs = Math.floor(diff / 3600);
                const mins = Math.floor((diff % 3600) / 60);
                const secs = diff % 60;
                document.getElementById('dashDuration').innerText = `Duration: ${hrs > 0 ? hrs + 'h ' : ''}${mins}m ${secs}s`;
            }, 1000);
        }

        async function signOut() {
            if (targetPC) {
                localStorage.removeItem(`dnhs_session_pc_${targetPC}`);
                if (client && navigator.onLine) {
                    try {
                        await client.from('active_sessions').update({ 
                            student_id: null, 
                            student_name: null, 
                            time_in: null, 
                            time_out: new Date().toISOString() 
                        }).eq('pc_number', targetPC);
                    } catch(e) {}
                }
            }
            window.location.reload();
        }
    </script>
</body>
</html>
