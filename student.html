<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNHS Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .background {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.25), transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 115, 0.15), transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(59, 130, 246, 0.1), transparent 50%);
            z-index: -1;
        }

        .background::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            mix-blend-mode: overlay;
        }

        .terminal-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .terminal-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .pc-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            padding: 8px 20px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 24px;
        }

        .pc-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #06b6d4;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
        }

        .terminal-header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .terminal-header p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 32px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card.blocked {
            border-color: rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.05);
            text-align: center;
        }

        .glass-card.blocked .blocked-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .glass-card.blocked h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fca5a5;
        }

        .glass-card.blocked p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 24px;
        }

        #qr-reader {
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
        }

        #qr-reader video {
            border-radius: 16px;
        }

        .scan-status {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 12px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
            letter-spacing: 0.02em;
        }

        .input-group input {
            width: 100%;
            padding: 16px 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            color: #fff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.01em;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
            box-shadow: 0 8px 24px rgba(239, 68, 68, 0.2);
        }

        .session-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 100px;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #06b6d4;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 24px;
        }

        .session-status .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #06b6d4;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 24px 0;
        }

        .info-item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 14px;
            transition: all 0.3s ease;
        }

        .info-item.full {
            grid-column: 1 / -1;
        }

        .info-item label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        .info-item .value {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
        }

        .info-item .value.highlight {
            color: #06b6d4;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Inter', monospace;
        }

        .hidden { display: none !important; }

        @media (max-width: 480px) {
            .terminal-container { padding: 16px; }
            .glass-card { padding: 24px; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="background"></div>

    <div class="terminal-container">
        <div class="terminal-header">
            <div class="pc-badge">
                <span class="dot"></span>
                <span id="pcBadge">PC STATION</span>
            </div>
            <h1 id="pageTitle">Student Terminal</h1>
            <p id="pageSubtitle">Enter your credentials to begin a session</p>
        </div>

        <div class="glass-card" id="qrGateCard">
            <div class="blocked-icon">&#128683;</div>
            <h2>Access Blocked</h2>
            <p>Please scan the QR code at your station to continue.</p>
            <div id="qr-reader"></div>
            <p class="scan-status" id="scanStatus">Point your camera at the QR code...</p>
        </div>

        <div class="glass-card hidden" id="mainCard">
            <div id="gateForm">
                <div class="input-group">
                    <label>LRN</label>
                    <input type="text" id="lrn" placeholder="Enter your LRN" maxlength="12" autocomplete="off">
                </div>
                <button class="btn" onclick="processAuth()">Sign In</button>
            </div>

            <div id="dashboard" class="hidden">
                <div class="session-status">
                    <span class="pulse"></span>
                    Session Active
                </div>
                
                <div class="info-grid">
                    <div class="info-item full">
                        <label>Student Name</label>
                        <div class="value" id="dashName">--</div>
                    </div>
                    <div class="info-item">
                        <label>Time In</label>
                        <div class="value" id="dashTime">--</div>
                    </div>
                    <div class="info-item">
                        <label>Duration</label>
                        <div class="value highlight" id="dashDuration">00:00:00</div>
                    </div>
                </div>

                <button class="btn btn-danger" onclick="signOut()">End Session</button>
            </div>
        </div>
    </div>

    <script>
        const client = supabase.createClient("https://kofyybvvzzlcxemwlaqu.supabase.co", "sb_publishable_EXyi06rbFxY4OUV1XRyfjw_omMnlxFN");
        const params = new URLSearchParams(window.location.search);
        const targetPC = params.get('pc') || "01";
        let sessionStartTime = null;
        let qrScanner = null;
        let qrAccessGranted = false;

        document.getElementById('pcBadge').innerText = `PC ${targetPC}`;

        // Calculate Duration
        setInterval(() => {
            if (sessionStartTime) {
                const diff = new Date() - new Date(sessionStartTime);
                const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
                const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
                const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
                document.getElementById('dashDuration').innerText = `${h}:${m}:${s}`;
            }
        }, 1000);

        function grantAccess() {
            if (qrAccessGranted) return;
            qrAccessGranted = true;
            document.getElementById('qrGateCard').classList.add('hidden');
            document.getElementById('mainCard').classList.remove('hidden');
            document.getElementById('pageTitle').innerText = 'Student Terminal';
            document.getElementById('pageSubtitle').innerText = 'Enter your credentials to begin a session';
        }

        function initQRScanner() {
            if (!window.Html5QrcodeScanner) {
                document.getElementById('scanStatus').innerText = 'QR scanner not supported in this browser.';
                return;
            }

            qrScanner = new Html5QrcodeScanner('qr-reader', {
                fps: 10,
                qrbox: { width: 220, height: 220 },
                aspectRatio: 1.0
            });

            qrScanner.render((decodedText) => {
                const qrPC = decodedText.replace(/[^0-9]/g, '').trim();
                if (qrPC === String(targetPC) || qrPC === targetPC) {
                    qrScanner.clear();
                    document.getElementById('scanStatus').innerText = 'Access granted!';
                    document.getElementById('scanStatus').style.color = '#06b6d4';
                    grantAccess();
                } else {
                    document.getElementById('scanStatus').innerText = `Scanned PC does not match this station (${targetPC}).`;
                    document.getElementById('scanStatus').style.color = '#ef4444';
                }
            }, (errorMessage) => {
                // scanning...
            });
        }

        window.addEventListener('load', () => {
            setTimeout(initQRScanner, 500);
        });

        async function processAuth() {
            const lrn = document.getElementById('lrn').value.trim();
            if(lrn.length < 12) return Swal.fire("Oops!", "Invalid LRN format.", "warning");

            Swal.fire({ title: 'Connecting...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            let { data: student } = await client.from('student_roster').select('student_name').eq('lrn', lrn).single();
            if (student) {
                const now = new Date();
                await client.from('active_sessions').update({ 
                    student_id: lrn, student_name: student.student_name, time_in: now.toISOString() 
                }).eq('pc_number', targetPC);
                
                sessionStartTime = now;
                document.getElementById('gateForm').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('dashName').innerText = student.student_name;
                document.getElementById('dashTime').innerText = now.toLocaleTimeString();
                document.getElementById('pageTitle').innerText = 'Session Active';
                document.getElementById('pageSubtitle').innerText = 'You are now signed in to this workstation';
                Swal.close();
            } else {
                Swal.fire("Error", "LRN not found.", "error");
            }
        }

        let isLocalSignOut = false;

        async function signOut() {
            const result = await Swal.fire({ title: 'End Session?', icon: 'question', showCancelButton: true });
            if (result.isConfirmed) {
                isLocalSignOut = true;
                await client.from('active_sessions').update({ student_id: null, student_name: null, time_in: null, time_out: new Date().toISOString() }).eq('pc_number', targetPC);
                window.location.reload();
            }
        }

        client.channel('active_sessions').on('postgres_changes', { event: '*', schema: 'public', table: 'active_sessions' }, (payload) => {
            const record = payload.new || payload.old;
            if (!isLocalSignOut && record && String(record.pc_number) === String(targetPC) && !record.student_id) {
                Swal.fire('Session Ended', 'Your session has been ended by the admin.', 'info').then(() => window.location.reload());
            }
        }).subscribe();
    </script>
</body>
</html>
