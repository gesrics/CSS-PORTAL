<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNHS QRBASED ADMIN</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0b0c10; color: #fff; min-height: 100vh; padding: 24px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; max-width: 1000px; margin-inline: auto; }
        .header h1 { font-size: 22px; font-weight: 700; color: #fff; }
        .btn-group { display: flex; gap: 10px; }
        .btn { padding: 10px 18px; border-radius: 10px; font-weight: 600; font-size: 13px; cursor: pointer; border: none; color: #fff; }
        .btn-primary { background: #06b6d4; color: #000; }
        .btn-danger { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; max-width: 1000px; margin-inline: auto; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 18px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; min-height: 160px; }
        .card.active { border-color: rgba(6, 182, 212, 0.4); background: rgba(6, 182, 212, 0.03); }
        .pc-title { font-size: 14px; font-weight: 700; color: #06b6d4; margin-bottom: 8px; }
        .student-info { font-size: 13px; color: rgba(255, 255, 255, 0.85); font-weight: 600; margin-bottom: 4px; }
        .time-label { font-size: 11px; color: rgba(255, 255, 255, 0.4); margin-bottom: 2px; }
        .duration-label { font-size: 12px; color: #facc15; font-weight: 500; margin-bottom: 12px; }
        .empty-status { font-size: 12px; color: rgba(255, 255, 255, 0.3); font-style: italic; margin-bottom: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>DNHS Admin Portal</h1>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="loadActiveSessions()">Refresh Status</button>
        </div>
    </div>

    <div class="grid" id="adminGrid"></div>

    <script>
        const client = (typeof supabase !== 'undefined') ? supabase.createClient("https://kofyybvvzzlcxemwlaqu.supabase.co", "sb_publishable_EXyi06rbFxY4OUV1XRyfjw_omMnlxFN") : null;
        let adminInterval = null;
        let liveDataCache = {};

        window.addEventListener('load', () => {
            loadActiveSessions();
            if (adminInterval) clearInterval(adminInterval);
            adminInterval = setInterval(loadActiveSessions, 3000);
        });

        async function loadActiveSessions() {
            liveDataCache = {};

            // 1. Unang basahin ang localStorage para laging may laman kahit offline
            for (let i = 1; i <= 4; i++) {
                const pc = String(i).padStart(2, '0');
                const localData = localStorage.getItem(`dnhs_session_pc_${pc}`);
                if (localData) {
                    try {
                        const parsed = JSON.parse(localData);
                        if (parsed && parsed.student_id) {
                            liveDataCache[pc] = {
                                pc_number: pc,
                                student_id: parsed.student_id,
                                student_name: `${parsed.student_name} (${parsed.section || '12 CSS'})`,
                                time_in: parsed.time_in
                            };
                        }
                    } catch(e) {}
                }
            }

            // 2. Subukan i-fetch sa Supabase kung online
            if (client && navigator.onLine) {
                try {
                    const { data, error } = await client.from('active_sessions').select('*').lte('pc_number', '04');
                    if (!error && data) {
                        data.forEach(s => {
                            if (s.student_id && s.student_name) {
                                liveDataCache[s.pc_number] = s;
                            }
                        });
                    }
                } catch(e) {}
            }

            renderAdminGrid();
        }

        function renderAdminGrid() {
            const grid = document.getElementById('adminGrid');
            grid.innerHTML = '';

            for (let i = 1; i <= 4; i++) {
                const pc = String(i).padStart(2, '0');
                const session = liveDataCache[pc] || { pc_number: pc, student_id: null, student_name: null, time_in: null };
                
                const isOccupied = session.student_id && session.student_name;
                
                const card = document.createElement('div');
                card.className = 'card' + (isOccupied ? ' active' : '');
                
                let detailsHTML = `<div class="empty-status">Vacant Station</div>`;
                let actionHTML = '';

                if (isOccupied) {
                    const timeInStr = session.time_in ? new Date(session.time_in).toLocaleTimeString() : '-';
                    let durationStr = '0m 0s';
                    
                    if (session.time_in) {
                        const diff = Math.floor((new Date() - new Date(session.time_in)) / 1000);
                        const hrs = Math.floor(diff / 3600);
                        const mins = Math.floor((diff % 3600) / 60);
                        const secs = diff % 60;
                        durationStr = `${hrs > 0 ? hrs + 'h ' : ''}${mins}m ${secs}s`;
                    }

                    detailsHTML = `
                        <div>
                            <div class="student-info">${escapeHtml(session.student_name)}</div>
                            <div class="time-label">Time In: ${timeInStr}</div>
                            <div class="duration-label">Duration: ${durationStr}</div>
                        </div>
                    `;
                    actionHTML = `<button class="btn btn-danger" onclick="forceSignOut('${pc}')">Force Sign Out</button>`;
                }

                card.innerHTML = `
                    <div>
                        <div class="pc-title">PC-${pc}</div>
                        ${detailsHTML}
                    </div>
                    ${actionHTML}
                `;
                grid.appendChild(card);
            }
        }

        async function forceSignOut(pc) {
            Swal.fire({ title: 'Signing out...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            if (client && navigator.onLine) {
                try {
                    await client.from('active_sessions').update({ 
                        student_id: null, 
                        student_name: null, 
                        time_in: null, 
                        time_out: new Date().toISOString() 
                    }).eq('pc_number', pc);
                } catch(e) {}
            }
            
            localStorage.removeItem(`dnhs_session_pc_${pc}`);

            Swal.close();
            Swal.fire("Success", `Na-force sign out ang PC-${pc}`, "success");
            loadActiveSessions();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
